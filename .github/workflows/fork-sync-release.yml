name: fork-sync-release

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: Release even when upstream has no new commits
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: fork-sync-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      APPCAST_PUBLISH_MODE: github-branch
      APPCAST_GIT_BRANCH: sparkle-appcast
      APPCAST_GIT_PATH: appcast.xml
      SPARKLE_FEED_URL: https://raw.githubusercontent.com/${{ github.repository }}/sparkle-appcast/appcast.xml
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARY_KEYCHAIN_PROFILE: supacode-notary
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/supabitapp/supacode.git
          else
            git remote add upstream https://github.com/supabitapp/supacode.git
          fi

      - name: Setup macOS toolchain
        uses: ./.github/actions/setup-macos

      - name: Install release tools
        run: brew install create-dmg

      - name: Configure signing and notarization
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_P12_BASE64:?missing APPLE_CERTIFICATE_P12_BASE64}"
          : "${APPLE_CERTIFICATE_PASSWORD:?missing APPLE_CERTIFICATE_PASSWORD}"
          : "${APPLE_ID:?missing APPLE_ID}"
          : "${APPLE_APP_SPECIFIC_PASSWORD:?missing APPLE_APP_SPECIFIC_PASSWORD}"
          : "${APPLE_TEAM_ID:?missing APPLE_TEAM_ID}"
          : "${SPARKLE_PRIVATE_KEY:?missing SPARKLE_PRIVATE_KEY}"

          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials "$APPLE_NOTARY_KEYCHAIN_PROFILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$KEYCHAIN_PATH"

          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle-private-key.pem"
          chmod 600 "$RUNNER_TEMP/sparkle-private-key.pem"
          echo "SPARKLE_PRIVATE_KEY_FILE=$RUNNER_TEMP/sparkle-private-key.pem" >> "$GITHUB_ENV"

      - name: Sync fork from upstream
        id: sync
        env:
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release || false }}
        run: |
          set -euo pipefail
          git fetch origin --prune
          git fetch upstream --prune
          git checkout main
          git merge --ff-only origin/main

          BEFORE_SHA="$(git rev-parse HEAD)"
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "already_contains_upstream=true" >> "$GITHUB_OUTPUT"
            echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
            echo "after_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
            if [[ "$FORCE_RELEASE" == "true" ]]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          git merge --no-ff --no-edit upstream/main
          AFTER_SHA="$(git rev-parse HEAD)"
          git push origin main
          echo "already_contains_upstream=false" >> "$GITHUB_OUTPUT"
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Create notarized release and Sparkle appcast
        if: steps.sync.outputs.should_release == 'true'
        run: ./doc-onevcat/scripts/release.sh

      - name: Summarize skip
        if: steps.sync.outputs.should_release != 'true'
        run: echo "No upstream changes to release."
